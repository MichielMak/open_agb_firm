name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm@sha256:116afba8df8453961de2936ffab20dd441edf4d682856c1ec8b0e53d7ed0bbf5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get ctr_firm_builder commit
        run: echo "FIRM_BUILDER_COMMIT=$(git ls-remote https://github.com/derrekr/ctr_firm_builder.git HEAD | cut -f1)" >> $GITHUB_ENV

      - name: Cache ctr_firm_builder
        id: cache-firm-builder
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ctr_firm_builder
          key: ${{ runner.os }}-${{ env.FIRM_BUILDER_COMMIT }}

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get -y install p7zip-full

      - name: Install ctr_firm_builder dependencies
        if: steps.cache-firm-builder.outputs.cache-hit != 'true'
        run: apt-get -y install gcc

      - name: Build ctr_firm_builder
        if: steps.cache-firm-builder.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/derrekr/ctr_firm_builder.git
          cd ctr_firm_builder
          make

      - name: Build release
        run: |
          export PATH=$PWD/ctr_firm_builder:$PATH
          make release

      - name: Get release asset name
        run: echo "ASSET=$(ls open_agb_firm*.7z)" >> $GITHUB_ENV

      - name: Generate release notes
        run: |
          GIT_CLIFF_VERSION=2.6.1
          apt-get update
          apt-get -y install curl
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          install -m 0755 "git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff

          # git-cliff invokes git; mark the checkout as a safe directory.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # Per-commit changelog for the tag being released.
          git-cliff --latest --config cliff.toml --output CHANGELOG_GENERATED.md

          {
            echo "## Installation"
            echo "1. Copy \`open_agb_firm.firm\` to \`/luma/payloads\` on your 3DS SD card (Luma3DS), or assign it a slot in fastboot3DS."
            echo "2. Copy the \`3ds\` folder to the root of your SD card."
            echo "3. Launch via Luma3DS by holding START while booting, or via your fastboot3DS slot assignment."
            echo ""
            echo "See the [README](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/README.md) for full setup and configuration instructions."
            echo ""
            cat CHANGELOG_GENERATED.md
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
