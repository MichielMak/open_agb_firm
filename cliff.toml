# git-cliff configuration — generates release notes from Conventional Commits.
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
# Template for a single release's notes (used with --latest).
body = """
{% if version -%}
## What's Changed in {{ version }}
{% else -%}
## What's Changed
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }}
{%- for f in commit.footers | default(value=[]) %}
{%- if f.token == "Closes" or f.token == "Fixes" or f.token == "Resolves" or f.token == "Refs" or f.token == "Upstream" %} ({{ f.value | trim }}){% endif %}
{%- endfor %} ({{ commit.id | truncate(length=7, end="") }})
{% endfor -%}
{% endfor %}
"""
trim = true
footer = ""
# Turn upstream issue references into clickable links in the final notes.
postprocessors = [
  { pattern = '\bprofi200/open_agb_firm#(\d+)\b', replace = "[profi200/open_agb_firm#${1}](https://github.com/profi200/open_agb_firm/issues/${1})" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

commit_parsers = [
  { message = "^Merge ", skip = true },
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^docs", group = "📖 Documentation" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "♻️ Refactor" },
  { message = "^test", group = "✅ Testing" },
  { message = "^ci", group = "🛠 Maintenance & CI" },
  { message = "^build", group = "🛠 Maintenance & CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore", group = "🛠 Maintenance & CI" },
  { message = "^revert", group = "⏪ Reverts" },
  { message = ".*", group = "🔧 Other Changes" },
]
